<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת קליקרים אולפנית - מקרן רשמי</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght=700&family=Rubik:wght=500;700;900&family=Orbitron:wght=700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Rubik', sans-serif;
            background-image: url('רקע.png'); 
            background-size: cover;
            background-position: center;
            box-sizing: border-box;
        }

        /* רשת ראשית אולפנית - שמאל: שעון, ימין: סטטיסטיקה */
        .screen-layout {
            display: grid;
            grid-template-columns: 360px 1fr 360px; 
            align-items: center;
            justify-items: center;
            width: 100%;
            height: 100vh;
            padding: 0 40px;
            box-sizing: border-box;
            position: relative;
        }

        /* פאנל שמאל: שעון עצר עגול */
        .left-timer-panel {
            position: relative;
            width: 340px;
            height: 340px;
            background-image: url('שעון עצר.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 150px; 
        }

        .timer-progress-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transform: rotate(-90deg);
            pointer-events: none;
            z-index: 4;
        }

        .timer-progress-svg circle {
            fill: none;
            stroke: #ffda73;
            stroke-width: 42; 
            stroke-dasharray: 660; 
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            filter: drop-shadow(0 0 8px rgba(255, 218, 115, 0.9));
        }

        .digital-clock {
            font-family: 'Orbitron', sans-serif;
            color: #ffda73;
            font-size: 2.3rem; 
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 218, 115, 0.8);
            z-index: 6;
            margin: 0;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100px;
            height: 100px;
        }

        /* פאנל ימין: ארון ריבוע הסטטיסטיקה */
        .stats-panel-wrapper {
            position: relative;
            width: 340px;
            height: 420px;
            background-image: url('ריבוע הסטטיסטיקה.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-top: 150px; 
        }

        /* גובה מדויק ונעול של המספרים לתוך המשבצות */
        .stat-value {
            position: absolute;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem; 
            font-weight: 900;
            width: 70px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            bottom: 132px; 
        }
        
        /* תיקון סופי: נכון (צבע ירוק) נמצא בצד שמאל של הריבוע */
        .stat-correct { 
            left: 70px; 
            color: #39ff14; 
            text-shadow: 0 0 12px rgba(57, 255, 20, 0.8); 
        }
        
        /* תיקון סופי: לא נכון (צבע אדום) נמצא בצד ימין של הריבוע */
        .stat-wrong { 
            right: 70px; 
            color: #ff3131; 
            text-shadow: 0 0 12px rgba(255, 49, 49, 0.8); 
        }

        /* פאנל מרכז: שאלה ותשובות מורמים למעלה למען מרווח תחתון */
        .center-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            margin-top: -60px; 
        }

        .question-number-display {
            font-size: 1.8rem;
            font-weight: 900;
            color: #e5c158;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .question-wrapper {
            position: relative;
            width: 760px;
            height: 230px;
        }

        .frame-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: fill;
            pointer-events: none;
            z-index: 1;
        }

        .question-text {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Amiri', serif;
            color: #2c1f11;
            font-size: 2.2rem;
            text-align: center;
            margin: 0;
            line-height: 1.4;
            font-weight: 700;
            padding: 0 90px;
            box-sizing: border-box;
            z-index: 2;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 25px;
            width: 100%;
        }

        .answer-card {
            position: relative;
            width: 380px;
            height: 100px;
            transition: all 0.3s ease;
        }

        .answer-card.correct {
            filter: drop-shadow(0 0 18px #e5c158);
            transform: scale(1.03);
        }

        .progress-bar {
            position: absolute;
            top: 12px; bottom: 12px; right: 20px;
            width: 0%;
            background: linear-gradient(90deg, rgba(229, 193, 88, 0.4) 0%, rgba(229, 193, 88, 0.05) 100%);
            mix-blend-mode: screen;
            border-radius: 8px;
            transition: width 0.4s ease-in-out;
            z-index: 2;
        }

        .card-content {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            padding: 0 45px;
            box-sizing: border-box;
        }

        .letter-col {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: #e5c158;
            font-weight: bold;
            margin-left: 12px;
        }

        .text-col {
            color: #fff9e6;
            font-size: 1.35rem;
            font-weight: 700;
            flex-grow: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .percent-text {
            font-size: 1.7rem;
            font-weight: 900;
            color: #e5c158;
            display: none; 
        }

        /* שחקנים מהירים בתחתית */
        .bottom-row {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            z-index: 50;
        }

        .speedy-players-container {
            display: none; 
            gap: 20px;
        }

        .player-badge-wrapper {
            position: relative;
            width: 250px;
            height: 75px;
        }

        .player-badge-content {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
            z-index: 3;
        }

        .player-title { font-size: 0.8rem; color: #a39581; font-weight: bold; }
        .player-name { font-size: 1.1rem; color: #fff9e6; font-weight: 900; text-shadow: 0 2px 4px #000; }

        body.topic-mode .left-timer-panel,
        body.topic-mode .stats-panel-wrapper,
        body.topic-mode .answers-grid,
        body.topic-mode .bottom-row {
            display: none;
        }

        body.topic-mode .screen-layout {
            grid-template-columns: 1fr;
            padding: 0 8vw;
        }

        body.topic-mode .center-panel {
            max-width: 1100px;
            margin-top: 0;
        }

        body.topic-mode .question-number-display {
            font-size: 2rem;
            color: #d9b04f;
        }

        body.topic-mode .question-wrapper {
            width: min(1050px, 86vw);
            height: 360px;
        }

        body.topic-mode .question-text {
            font-size: 4.2rem;
            line-height: 1.25;
            padding: 0 120px;
        }

        body.survey-mode .stat-correct {
            left: 50%;
            transform: translateX(-50%);
            color: #ffda73;
        }

        body.survey-mode .stat-wrong {
            display: none;
        }

        body.survey-mode .answer-card.correct {
            filter: none;
            transform: none;
        }

        /* לוגו בימין למעלה */
        .logo-video-container {
            position: fixed;
            top: 25px;
            right: 40px;
            width: 175px; 
            height: 175px;
            z-index: 100;
        }
        .logo-video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <audio id="snd-ambient" src="sound-ambient.mp3" preload="auto" loop></audio>
    <audio id="snd-end" src="sound-end.mp3" preload="auto" loop></audio>
    <audio id="snd-reveal" src="sound-reveal.mp3" preload="auto"></audio>

    <div class="screen-layout">

        <!-- שמאל: שעון עצר עגול -->
        <div class="left-timer-panel">
            <svg class="timer-progress-svg">
                <circle cx="50%" cy="50%" r="105"></circle>
            </svg>
            <div class="digital-clock" id="clock-display">15</div>
        </div>

        <!-- מרכז: שאלה ותשובות -->
        <div class="center-panel">
            <div class="question-number-display" id="question-number">טוען...</div>
            
            <div class="question-wrapper">
                <img src="שאלה.png" class="frame-img" alt="שאלה">
                <h1 class="question-text" id="question-text">מחבר לשרת...</h1>
            </div>

            <div class="answers-grid" id="answers-container">
                <!-- נבנה דינמית -->
            </div>
        </div>

        <!-- ימין: סטטיסטיקה -->
        <div class="stats-panel-wrapper">
            <div class="stat-value stat-correct" id="live-correct">0</div>
            <div class="stat-value stat-wrong" id="live-wrong">0</div>
        </div>

        <!-- תחתית: שחקנים מהירים -->
        <div class="bottom-row">
            <div class="speedy-players-container" id="speedy-panel">
                <div class="player-badge-wrapper">
                    <img src="תשובה.png" class="frame-img" alt="נגן">
                    <div class="player-badge-content">
                        <span class="player-title">⚡ מקום 1 - הכי מהיר</span>
                        <span class="player-name" id="p1-name">-</span>
                    </div>
                </div>
                <div class="player-badge-wrapper">
                    <img src="תשובה.png" class="frame-img" alt="נגן">
                    <div class="player-badge-content">
                        <span class="player-title">🥈 מקום 2</span>
                        <span class="player-name" id="p2-name">-</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- וידאו לוגו קבוע בימין למעלה -->
    <div class="logo-video-container">
        <video class="logo-video" autoplay loop muted playsinline>
            <source src="אנימציית לוגו.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function cleanServerUrl(rawUrl) {
            let url = (rawUrl || "http://localhost:3000").trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = url.includes('localhost') || url.startsWith('127.0.0.1') ? `http://${url}` : `https://${url}`;
            }
            return url.endsWith('/') ? url.slice(0, -1) : url;
        }

        // שינוי ברירת המחדל לכתובת המקומית של המחשב כדי לעקוף את נטפרי לחלוטין!
        const SERVER_URL = cleanServerUrl(localStorage.getItem('render_server_url'));

        let TOTAL_TIME = 15;
        let timeLeft = TOTAL_TIME;
        let timerInterval;
        let isTimerRunning = false;
        let lastQuestionId = null;
        let lastDisplayType = null;

        function initQuestion(data) {
            const qNum = data.questionNumber;
            const qText = data.questionText;
            const answers = data.answers || [];
            const displayType = data.type || 'trivia';
            const isTopic = displayType === 'topic';
            const isSurvey = displayType === 'survey' || data.correctIndex === -1;

            document.body.classList.toggle('topic-mode', isTopic);
            document.body.classList.toggle('survey-mode', isSurvey && !isTopic);

            if (data.timer) TOTAL_TIME = data.timer;
            document.getElementById('question-number').innerText = isTopic ? 'נושא' : isSurvey ? `סקר ${qNum}` : `שאלה ${qNum}`;
            document.getElementById('question-text').innerText = qText;
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';

            if (isTopic) {
                clearInterval(timerInterval);
                isTimerRunning = false;
                document.getElementById('clock-display').innerText = '';
                document.getElementById('live-correct').innerText = 0;
                document.getElementById('live-wrong').innerText = 0;
                document.getElementById('speedy-panel').style.display = 'none';
                lastQuestionId = qNum;
                lastDisplayType = displayType;
                return;
            }
            
            const letters = ["א.", "ב.", "ג.", "ד.", "ה."];
            (answers || []).forEach((ans, idx) => {
                if(String(ans || "").trim() !== "") {
                    container.innerHTML += `
                        <div class="answer-card" id="card-${idx}">
                            <img src="תשובה.png" class="frame-img" alt="תשובה">
                            <div class="progress-bar" id="bar-${idx}"></div>
                            <div class="card-content">
                                <div class="letter-col">${letters[idx]}</div>
                                <div class="text-col">${ans}</div>
                                <div class="percent-text" id="pct-${idx}">0%</div>
                            </div>
                        </div>
                    `;
                }
            });

            if (lastQuestionId !== qNum || lastDisplayType !== displayType) {
                lastQuestionId = qNum;
                lastDisplayType = displayType;
                resetAndStartTimer();
            }
        }

        function resetAndStartTimer() {
            clearInterval(timerInterval);
            timeLeft = TOTAL_TIME;
            document.getElementById('clock-display').innerText = timeLeft;
            
            const circle = document.querySelector('.timer-progress-svg circle');
            circle.style.transition = 'stroke-dashoffset 1s linear';
            circle.style.strokeDashoffset = 0;

            document.getElementById('snd-ambient').currentTime = 0;
            document.getElementById('snd-ambient').play().catch(e => {});
            document.getElementById('snd-end').currentTime = 0;
            document.getElementById('snd-end').play().catch(e => {});

            isTimerRunning = true;

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isTimerRunning = false;
                    document.getElementById('clock-display').innerText = 0;
                    circle.style.transition = 'none'; 
                    circle.style.strokeDashoffset = 660; 
                    
                    document.getElementById('snd-ambient').pause();
                    document.getElementById('snd-end').pause();
                    document.getElementById('snd-reveal').play().catch(e => {});
                } else {
                    document.getElementById('clock-display').innerText = timeLeft;
                    circle.style.strokeDashoffset = 660 - (660 * timeLeft / TOTAL_TIME);
                }
            }, 1000);
        }

        async function fetchServerData() {
            try {
                const response = await fetch(`${SERVER_URL}/studio-data`);
                const data = await response.json();

                initQuestion(data);

                const isTopic = data.type === 'topic';
                const isSurvey = data.type === 'survey' || data.correctIndex === -1;

                if (!isTopic) {
                    const totalVotes = (data.correctCount || 0) + (data.wrongCount || 0);
                    document.getElementById('live-correct').innerText = isSurvey ? totalVotes : data.correctCount;
                    document.getElementById('live-wrong').innerText = isSurvey ? 0 : data.wrongCount;
                }

                if (!isSurvey && data.fastestPlayers && data.fastestPlayers.length > 0) {
                    document.getElementById('p1-name').innerText = data.fastestPlayers[0] || '-';
                    document.getElementById('p2-name').innerText = data.fastestPlayers[1] || '-';
                    document.getElementById('speedy-panel').style.display = 'flex';
                } else {
                    document.getElementById('p1-name').innerText = '-';
                    document.getElementById('p2-name').innerText = '-';
                    document.getElementById('speedy-panel').style.display = 'none';
                }

                if (!isTopic && !isTimerRunning) {
                    data.percents.forEach((pct, idx) => {
                        const bar = document.getElementById(`bar-${idx}`);
                        const pctText = document.getElementById(`pct-${idx}`);
                        if (bar) bar.style.width = pct + '%';
                        if (pctText) {
                            pctText.innerText = pct + '%';
                            pctText.style.display = 'block';
                        }
                    });

                    if (!isSurvey && data.correctIndex !== -1) {
                        const correctCard = document.getElementById(`card-${data.correctIndex}`);
                        if (correctCard) correctCard.classList.add('correct');
                    }
                }

            } catch (error) {
                console.error("שגיאה במשיכת נתונים משרת מקומי:", error);
                document.getElementById('question-number').innerText = 'אין חיבור';
                document.getElementById('question-text').innerText = 'בודק חיבור לשרת...';
            }
        }

        fetchServerData();
        setInterval(fetchServerData, 500);
    </script>
</body>
</html>
